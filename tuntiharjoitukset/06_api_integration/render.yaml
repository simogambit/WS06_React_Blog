services:
  - type: web
    name: ws06-api-backend
    env: docker
    rootDir: tuntiharjoitukset/06_api_integration/backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/notes
    envVars:
      - key: PORT
        value: 3001
      # Set this to your frontend Render URL after first deploy
      # Example: https://ws06-api-frontend.onrender.com
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: ws06-api-frontend
    env: docker
    rootDir: tuntiharjoitukset/06_api_integration/frontend
    dockerfilePath: ./Dockerfile
    envVars:
      # Set this to your backend Render URL after first deploy
      # Example: https://ws06-api-backend.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
